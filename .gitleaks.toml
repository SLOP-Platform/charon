title = "Charon Gitleaks Config"

[extend]
useDefault = true

# gitleaks auto-loads this file from the scanned repo root when land.run_gitleaks
# runs `gitleaks detect --source <repo>` (config precedence #3: target path).
# No --config flag needed in land.py.
[allowlist]
description = "CI placeholder tokens and env-var bearer references are not secrets"
regexTarget = "line"
regexes = [
    # env-var references with CHARON_ prefix in Authorization headers are not literals
    '''Authorization:\s*Bearer\s*\$\{?CHARON_[A-Z0-9_]+\}?''',
    # ci-smoke-token is the integration smoke-test placeholder used in release.yml
    '''Authorization:\s*Bearer\s*ci-smoke-token''',
]
