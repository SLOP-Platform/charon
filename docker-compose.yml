# Charon with Docker. A bare `docker compose up` brings up the GATEWAY (the
# first-class fresh-install path): a token-gated, OpenAI-compatible endpoint on
# the host's loopback with persistent config. See docs/docker.md.
#
#   cp .env.example .env        # then set CHARON_GATEWAY_TOKEN (openssl rand -hex 16)
#   docker compose up           # gateway on http://127.0.0.1:8080/v1
#
# The Mode-B fenced service (ADR-0002 §2.3) stays behind `profile: service` so it
# is NOT started by a bare `up`; bring it up deliberately:
#   docker compose --profile service up charon-service
services:
  # --- Mode B — run Charon as a fenced service (ADR-0002 §2.3). -------------------
  # SLOP (or any operator) talks to it over the HTTP surface; the privileged loop
  # stays inside this container.
  charon-service:
    # SINGLE PRODUCER (SR-10 / D024): image-only — no `build:`. The deploy box only
    # PULLS a CI-built, immutable semver tag; it can never build a divergent artifact
    # (two producers can drift). Both services run the SAME image and differ only by
    # the `command:` below. The image's default target is this Mode-B uvicorn service
    # on :8473; the gateway (below) is the explicit `command: charon gateway` override.
    image: ghcr.io/slop-platform/charon:v0.2.1
    command: ["uvicorn", "charon.service.app:app", "--host", "0.0.0.0", "--port", "8473"]
    ports:
      # Bind the host side to LOOPBACK by default (reconciliation BR2-1/D3): the
      # service fronts the privileged loop, so it must not be reachable off-host
      # without a deliberate change. In Mode B, SLOP reaches it over the docker
      # network or an explicit, authenticated mapping — never a bare 0.0.0.0.
      - "127.0.0.1:8473:8473"
    volumes:
      # Mount ONLY the project you want Charon to work on. The container
      # boundary is the blast-radius limit — do not mount the host root.
      - ./work:/work
    environment:
      - CHARON_STATE_DIR=/work/.charon
    # No host docker socket, no privileged flag — keep the fence intact.
    restart: unless-stopped
    profiles: ["service"]

  # --- The GATEWAY — the default `docker compose up` target ----------------------
  # A clean, token-gated, OpenAI-compatible gateway with PERSISTENT config and no
  # host Python required. For an everyday LOCAL gateway, native
  # `pipx install charon && charon gateway` is also fine; use this for a
  # container / VPS / always-on gateway, or when host Python is unavailable.
  gateway:
    # SINGLE PRODUCER (SR-10 / D024): image-only — no `build:`. Same immutable CI image
    # as charon-service; the gateway is selected by the explicit command override below.
    image: ghcr.io/slop-platform/charon:v0.2.1
    # Spell the gateway command EXPLICITLY as `charon gateway …` (not a bare `gateway`).
    # The published image's ENTRYPOINT is not guaranteed to prepend `charon`: a
    # from-source build can have ENTRYPOINT=null and default to the Mode-B uvicorn
    # service, so a bare `gateway` would fail to resolve. The explicit `charon` prefix
    # runs correctly whether or not the image ships the charon-entrypoint wrapper — this
    # closes the image≠source gap that took the gateway down on a past deploy.
    command: ["charon", "gateway", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      # Publish to the HOST's loopback only (not your LAN). Clients on the host use
      # http://127.0.0.1:8080/v1 ; the token below is their API key. To widen to the
      # LAN deliberately, change this to "8080:8080" — it stays token-gated.
      - "127.0.0.1:8080:8080"
    environment:
      # REQUIRED: the gateway binds 0.0.0.0 inside the container and holds your keys,
      # so it refuses to start without a token. Copy .env.example to .env and set it:
      #   openssl rand -hex 16
      - CHARON_GATEWAY_TOKEN=${CHARON_GATEWAY_TOKEN:?set CHARON_GATEWAY_TOKEN — copy .env.example to .env, then run openssl rand -hex 16}
      # Config + STATE both live on the MOUNTED VOLUME (/data). CHARON_HOME points the
      # config loader (providers/models/pools + 0600 secrets) at /data; CHARON_STATE_DIR
      # points runtime state writes (spend.json, quality.json, tiers.json) at /data too,
      # OVERRIDING the image's /work/.charon default. That default is for the Mode-B
      # service (which bind-mounts ./work:/work); the gateway has NO /work mount, so
      # leaving CHARON_STATE_DIR=/work/.charon makes it read an EMPTY, EPHEMERAL path —
      # the gateway comes up with 0 providers and every `docker compose down && up`
      # (container recreate) wipes state. Keep CHARON_HOME == CHARON_STATE_DIR == /data
      # (== the charon-config volume) so config survives redeploys.
      - CHARON_HOME=/data
      - CHARON_STATE_DIR=/data
    volumes:
      # A NAMED volume (not a bind) so Docker seeds it from the image's /data —
      # owned by uid 10001 — and `charon setup` / `providers add` can write the
      # 0600 secrets.json. Config persists across restarts; first-time setup:
      #   docker compose run --rm gateway setup
      - charon-config:/data
    extra_hosts:
      # so providers running on the HOST (LM Studio :1234, Ollama :11434, Jan :1337)
      # are reachable — set those providers' base_url to host.docker.internal:<port>
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Token-aware probe on the gateway's real surface (GET /v1/models), stdlib
      # urllib (no curl in the slim image). Mirrors the image-level HEALTHCHECK.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import os,urllib.request as u;t=os.environ.get('CHARON_GATEWAY_TOKEN');r=u.Request('http://127.0.0.1:8080/v1/models',headers={'Authorization':'Bearer '+t} if t else {});u.urlopen(r,timeout=4).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  # Persistent gateway config (providers/models/pools + 0600 secrets.json).
  charon-config:
