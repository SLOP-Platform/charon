# Mode B — run Charon as a fenced service (ADR-0002 §2.3).
# SLOP (or any operator) talks to it over the HTTP surface; the privileged loop
# stays inside this container.
services:
  charon:
    build: .
    image: ghcr.io/slop-platform/charon:v0.1.0
    ports:
      # Bind the host side to LOOPBACK by default (reconciliation BR2-1/D3): the
      # service fronts the privileged loop, so it must not be reachable off-host
      # without a deliberate change. In Mode B, SLOP reaches it over the docker
      # network or an explicit, authenticated mapping — never a bare 0.0.0.0.
      - "127.0.0.1:8473:8473"
    volumes:
      # Mount ONLY the project you want Charon to work on. The container
      # boundary is the blast-radius limit — do not mount the host root.
      - ./work:/work
    environment:
      - CHARON_STATE_DIR=/work/.charon
    # No host docker socket, no privileged flag — keep the fence intact.
    restart: unless-stopped

  # --- Optional: run the GATEWAY in a container (hosted / always-on use) ---------
  # For the everyday LOCAL gateway, native `pipx install charon && charon gateway`
  # is simpler (reaches host-local model servers directly, no token needed on
  # loopback). Use this for a shared/VPS/always-on gateway. `build: .` from source,
  # or set `image: ghcr.io/slop-platform/charon:v0.2.0` (the first published image
  # that contains `charon gateway`).
  gateway:
    build: .
    command: ["charon", "gateway", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      # publish to the HOST's loopback only (not your LAN). Clients on the host use
      # http://127.0.0.1:8080/v1 ; the token below is their API key.
      - "127.0.0.1:8080:8080"
    environment:
      # REQUIRED: the gateway binds 0.0.0.0 inside the container and holds your keys,
      # so it refuses to start without a token. Generate one: openssl rand -hex 16
      - CHARON_GATEWAY_TOKEN=${CHARON_GATEWAY_TOKEN:?set CHARON_GATEWAY_TOKEN (the gateway holds your provider keys)}
      - CHARON_HOME=/config
    volumes:
      # providers/models/pools config + the 0600 secrets file persist here
      - ./charon-config:/config
    extra_hosts:
      # so providers running on the HOST (LM Studio :1234, Ollama :11434, Jan :1337)
      # are reachable — set those providers' base_url to host.docker.internal:<port>
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    profiles: ["gateway"]   # opt-in: `docker compose --profile gateway up gateway`
