name: release

# ADR-0002 §5 Tier 2b / SUPPLY-CHAIN.md §5: publish the Mode-B image to GHCR, but
# ONLY on a published Release and ONLY after the gate + image build pass — never
# an untested image (BR2-8). Back on GitHub, the original (cleanest) supply-chain
# path is restored: GHCR + GitHub-native SLSA provenance via OIDC
# (attest-build-provenance) — no key management, no cosign. The base is
# digest-PINNED (resolved fresh, recorded in provenance); only the immutable
# :vX.Y.Z is pushed, never :latest. No publish token surface exists off the
# release path. Runs on the shared self-hosted 4-LOM runner (zero GitHub minutes).
#
# SR-10: publish on TAG PUSH as well as on a published Release, so the GHCR image
# can never lag a pushed version tag (the deploy box pulls immutable :vX.Y.Z tags).
# Both triggers still gate on the same `gate` + `image-smoke` jobs (publish needs:
# them), so an untested image is never pushed. The derive-version step matches the
# tag to pyproject for both triggers via GITHUB_REF_NAME. Published tags are
# immutable — never overwritten, never :latest.
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

# A tag push and its published Release both fire this workflow for the same ref
# (refs/tags/vX.Y.Z). On the shared self-hosted 4-LOM runner those two runs would
# otherwise execute at the same time and stomp each other (shared Docker state,
# duplicate publish push). Serialize per-ref so they run one after another;
# cancel-in-progress is false so the first run completes and publishes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    # Runner is chosen by the CI_RUNNER repo variable (Settings → Variables).
    # Maintainer sets CI_RUNNER=["self-hosted","4-lom"]; forks don't inherit it and
    # fall back to GitHub-hosted ubuntu-latest, so forked PRs get working CI.
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: install (dev + service)
        run: pip install -e '.[dev,service]'
      - name: host-project boundary check (INV-B1/B5)
        run: python3 tools/check_boundary.py src
      - name: version consistency
        run: python3 tools/check_version.py
      - name: lint
        run: ruff check src tests tools
      - name: type
        run: mypy src/charon
      - name: tests
        # Job-scoped tmp root (see ci.yml) — the shared 4-LOM runner has no
        # per-job /tmp isolation, so a concurrent ci.yml gate run can otherwise
        # rm_rf this run's live pytest basetemp mid-suite.
        env:
          PYTEST_DEBUG_TEMPROOT: ${{ runner.temp }}
        run: pytest -q -n auto

  image-smoke:
    # Runner is chosen by the CI_RUNNER repo variable (Settings → Variables).
    # Maintainer sets CI_RUNNER=["self-hosted","4-lom"]; forks don't inherit it and
    # fall back to GitHub-hosted ubuntu-latest, so forked PRs get working CI.
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4
      - name: build image
        run: docker build -t charon:ci .
      - name: run gateway + /v1/models
        # Image default is the token-gated gateway on :8080 (CMD in Dockerfile).
        # A tokenless 0.0.0.0 bind is refused (NonLoopbackBindWithoutToken), so we
        # supply CHARON_GATEWAY_TOKEN. The gateway returns HTTP 200 with an empty
        # model list before any provider is configured — that is sufficient for smoke.
        # Mode-B service surface (:8473/healthz) is exercised by the test suite in
        # the gate job and does not need a separate container here.
        run: |
          # Host port 0 = a free, kernel-assigned host port; never a fixed one.
          # The production gateway on the shared self-hosted 4-LOM runner already
          # binds host 8080, and multiple release runs can land on that runner, so
          # any fixed host port (8080, 18080, ...) collides ("port is already
          # allocated", exit 125). The container name is run-scoped for the same
          # reason (a fixed name conflicts across concurrent runs). The container
          # still listens on its internal 8080 — only the host side is dynamic.
          name="charon-rel-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          trap 'docker rm -f "$name" >/dev/null 2>&1 || true' EXIT
          docker rm -f "$name" >/dev/null 2>&1 || true
          docker run -d --name "$name" \
            -e CHARON_GATEWAY_TOKEN=ci-smoke-token \
            -p 127.0.0.1:0:8080 charon:ci
          hostport=$(docker port "$name" 8080/tcp | head -n1 | sed 's/.*://')
          ok=0
          for _ in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ci-smoke-token" \
              "http://127.0.0.1:${hostport}/v1/models") || true
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 1
          done
          docker logs "$name"
          docker rm -f "$name"
          test "${ok:-0}" = "1"

  publish:
    needs: [gate, image-smoke]
    # Runner is chosen by the CI_RUNNER repo variable (Settings → Variables).
    # Maintainer sets CI_RUNNER=["self-hosted","4-lom"]; forks don't inherit it and
    # fall back to GitHub-hosted ubuntu-latest, so forked PRs get working CI.
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write       # OIDC for build provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4

      - name: derive version (single source of truth = pyproject)
        id: ver
        run: |
          V=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # The release tag must match the package version (no drift).
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$V" ]; then
            echo "release tag '$GITHUB_REF_NAME' != pyproject version '$V'" >&2
            exit 1
          fi

      - name: resolve + pin base image digest (supply-chain gate)
        id: base
        run: |
          docker buildx imagetools inspect python:3.12-slim --raw > /dev/null
          DIGEST=$(docker buildx imagetools inspect python:3.12-slim \
                    --format '{{.Manifest.Digest}}')
          case "$DIGEST" in
            sha256:*) : ;;
            *) echo "could not resolve base digest" >&2; exit 1 ;;
          esac
          echo "base=python:3.12-slim@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pinned base: python:3.12-slim@${DIGEST}"

      - name: log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c  # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push (digest-pinned base, immutable version tag)
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.base }}
            CHARON_BUILD_SHA=${{ github.sha }}
          tags: ghcr.io/slop-platform/charon:v${{ steps.ver.outputs.version }}

      - name: attest build provenance (SLSA via GitHub OIDC)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-name: ghcr.io/slop-platform/charon
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
