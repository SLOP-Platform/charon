name: Windows EXE

# ADR-0005 D7 / P5 — builds charon.exe via PyInstaller on the free windows-latest
# runner.  Intentionally separate from ci.yml/heavy.yml which run on the
# self-hosted Linux [4-lom] runner; this workflow MUST NOT run on that runner.
#
# Triggers: manual dispatch OR a version tag push (v*).
# NOT triggered on every push — keeps the self-hosted runner untouched.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-exe:
    name: Build charon.exe
    runs-on: windows-latest  # free GitHub-hosted runner; never self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4  # first-party major-tag policy (ACTION-PIN-POLICY)

      - name: Set up Python
        uses: actions/setup-python@v5  # first-party major-tag policy (ACTION-PIN-POLICY)
        with:
          python-version: "3.11"

      - name: Install package + PyInstaller
        run: pip install .[packaging]

      - name: Build charon.exe
        run: pyinstaller packaging/charon.spec

      - name: Smoke test — charon.exe --help exits 0
        # bash (Git Bash, preinstalled on windows-latest) uses `set -eo pipefail`,
        # so a non-zero exit fails the step; the exe's --help output prints inline.
        # Avoids the pwsh Start-Process exit-code footgun entirely.
        shell: bash
        run: dist/charon.exe --help

      - name: Upload charon.exe artifact
        uses: actions/upload-artifact@v4  # first-party major-tag policy (ACTION-PIN-POLICY)
        with:
          name: charon-windows-exe
          path: dist/charon.exe
          if-no-files-found: error
          retention-days: 30
