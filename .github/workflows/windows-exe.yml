name: Windows EXE

# ADR-0005 D7 / P5 — builds charon.exe via PyInstaller on the free windows-latest
# runner.  Intentionally separate from ci.yml/heavy.yml which run on the
# self-hosted Linux [4-lom] runner; this workflow MUST NOT run on that runner.
#
# Triggers: manual dispatch OR a version tag push (v*).
# NOT triggered on every push — keeps the self-hosted runner untouched.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-exe:
    name: Build charon.exe
    runs-on: windows-latest  # free GitHub-hosted runner; never self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install package + PyInstaller
        run: pip install .[packaging]

      - name: Build charon.exe
        run: pyinstaller packaging/charon.spec

      - name: Smoke test — charon.exe --help exits 0
        run: |
          $proc = Start-Process -FilePath "dist\charon.exe" -ArgumentList "--help" `
            -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            Write-Error "charon.exe --help returned exit code $($proc.ExitCode)"
            exit 1
          }
        shell: pwsh

      - name: Upload charon.exe artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: charon-windows-exe
          path: dist/charon.exe
          if-no-files-found: error
          retention-days: 30
