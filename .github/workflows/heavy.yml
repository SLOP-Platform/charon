name: heavy

# Heavy/slow suites: NOT on every push — only on a weekly schedule
# and on-demand via workflow_dispatch. Keeps the fast gate (ci.yml) fast while
# still proving, regularly, that (a) the standalone wheel never bit-rots behind
# the SLOP embed, (b) the Mode-B image still builds and the fenced service
# answers, and (c) no unvetted/advisory-flagged deps crept in. Runs on the shared
# self-hosted 4-LOM runner (Docker + buildx present); zero GitHub minutes.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  modeA-isolation:
    # INV-B6: build the wheel, install it in a clean venv with NO repo on the
    # path, and prove the CLI works standalone (the standalone app never bit-rots
    # behind the SLOP embed).
    # Runner is chosen by the CI_RUNNER repo variable (Settings → Variables).
    # Maintainer sets CI_RUNNER=["self-hosted","4-lom"]; forks don't inherit it and
    # fall back to GitHub-hosted ubuntu-latest, so forked PRs get working CI.
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: build wheel + install in a clean venv
        run: |
          pip install build
          python -m build --wheel
          python -m venv "$RUNNER_TEMP/clean"
          "$RUNNER_TEMP/clean/bin/pip" install dist/*.whl
      - name: smoke — standalone CLI + mock end-to-end
        run: |
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/clean/bin/charon" --version
          "$RUNNER_TEMP/clean/bin/charon" run --goal "ci smoke" \
            --accept "test -f ok.txt" --backend mock --autonomy L1
      - name: smoke — cross-vendor handoff reaches completion
        run: |
          cd "$RUNNER_TEMP"
          # Two mock vendors configured; proves multi-backend handoff wiring.
          "$RUNNER_TEMP/clean/bin/charon" run --goal "ci handoff" \
            --accept "test -f ok.txt" --backend mock-a,mock-b --autonomy L1

  image-smoke:
    # ADR-0002 §5 Tier 2 (build axis): prove the Mode-B image still BUILDS and
    # the fenced service answers — without publishing (no token surface; GHCR
    # publish-on-tag is release.yml).
    # Runner is chosen by the CI_RUNNER repo variable (Settings → Variables).
    # Maintainer sets CI_RUNNER=["self-hosted","4-lom"]; forks don't inherit it and
    # fall back to GitHub-hosted ubuntu-latest, so forked PRs get working CI.
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: build image
        run: docker build -t charon:ci .
      - name: run service + healthz
        run: |
          name="charon-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          trap 'docker rm -f "$name" >/dev/null 2>&1 || true' EXIT
          docker rm -f "$name" >/dev/null 2>&1 || true
          docker run -d --name "$name" -p 127.0.0.1:0:8473 charon:ci
          hostport=$(docker port "$name" 8473/tcp | head -n1 | sed 's/.*://')
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${hostport}/healthz"; then ok=1; break; fi
            sleep 1
          done
          docker logs "$name"
          docker rm -f "$name" >/dev/null 2>&1 || true
          test "${ok:-0}" = "1"

  supply-chain-audit:
    # Advisory: the privileged loop carries no unvetted deps. Non-blocking by
    # design (pip-audit DB flaps); surfaced here rather than gating every push.
    # Runner is chosen by the CI_RUNNER repo variable (Settings → Variables).
    # Maintainer sets CI_RUNNER=["self-hosted","4-lom"]; forks don't inherit it and
    # fall back to GitHub-hosted ubuntu-latest, so forked PRs get working CI.
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: install (dev + service)
        run: pip install -e '.[dev,service]'
      - name: pip-audit
        run: pip-audit || true
