name: ci

# Fast gate: lint + typecheck + unit tests on every push/PR.
# Runs on the shared self-hosted 4-LOM runner pool (zero GitHub minutes); if the
# org runners aren't online yet the run just QUEUES until they are. Heavy/slow
# suites (wheel-isolation smoke, image build-smoke, supply-chain audit) live in
# heavy.yml on a schedule/dispatch; the GHCR publish lives in release.yml.
# ADR-0002 §4: the gate carries the host-import boundary check, version
# consistency, lint, type, and the full test suite ([service] extra so the
# web/dashboard tests run too).
on:
  push:
    branches: [master, main]
  pull_request:

# Cancel stale runs on rapid pushes; one slot per ref at a time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    # Runner is chosen by the CI_RUNNER repo variable (Settings → Variables).
    # Maintainer sets CI_RUNNER=["self-hosted","4-lom"]; forks don't inherit it and
    # fall back to GitHub-hosted ubuntu-latest, so forked PRs get working CI.
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: install (dev + service)
        run: pip install -e '.[dev,service]'

      - name: charon gate (lint, type, boundary, version, gate-registry)
        run: python3 -m charon.cli gate

      - name: tests
        # Root pytest's tmp dirs under the job-scoped runner temp (cleaned per-job
        # by Actions) instead of the host-wide /tmp/pytest-of-<user>. On the
        # persistent shared self-hosted 4-LOM runner, /tmp is NOT job-isolated —
        # a concurrent workflow run (e.g. this ci.yml gate racing release.yml's
        # gate on a tag push) shares the same pytest-of-stack numbering/cleanup
        # and can rm_rf a sibling run's still-live basetemp mid-suite, which
        # cascades into every subsequent test ERRORing at fixture SETUP.
        env:
          PYTEST_DEBUG_TEMPROOT: ${{ runner.temp }}
        run: pytest -q -n auto

      - name: render review-log (verify all fragments are readable)
        # docs/REVIEW-LOG.md is gitignored (generated); --check would always fail on a
        # fresh CI checkout. Run in generate mode to prove all fragments are valid.
        run: python3 tools/render_review_log.py

      - name: decision-register lint
        run: python3 tools/check_decisions.py --check

  wheel-smoke:
    # Fast wheel/import smoke: catches packaging breakage before it merges.
    # Parallel to gate so it doesn't slow the critical path.
    # Runner is chosen by the CI_RUNNER repo variable (Settings → Variables).
    # Maintainer sets CI_RUNNER=["self-hosted","4-lom"]; forks don't inherit it and
    # fall back to GitHub-hosted ubuntu-latest, so forked PRs get working CI.
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: install build frontend
        run: pip install build

      - name: build wheel
        run: python -m build --wheel

      - name: install wheel into a clean venv + import smoke
        run: |
          python -m venv "$RUNNER_TEMP/wheel-smoke"
          "$RUNNER_TEMP/wheel-smoke/bin/pip" install dist/*.whl
          "$RUNNER_TEMP/wheel-smoke/bin/python" -c "import charon; print('import ok')"
          "$RUNNER_TEMP/wheel-smoke/bin/charon" --version
